                        <Btn sm onClick={()=>confirmTx(tx.id)} bg="#f0fdf4" bdr="#bbf7d0" color="#16a34a"><Ic.Check/>確認</Btn>
                        <Btn sm onClick={()=>{setCorrectionTarget(tx);setCorrectionNote("");}} bg="#fef2f2" bdr="#fecaca" color="#dc2626">⚠ 要訂正</Btn>
                      </div>
                    </div>
                  </div>
                </div>
              );})}
            </div>
          )}
        </>)}

        {/* 出荷 */}
        {tab==="shipments"&&(<>
          <div style={{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}}>
            <PBtn onClick={()=>setModal("addShip")} bg="#7c3aed"><Ic.Plus/>出荷指示を作成</PBtn>
            <PBtn onClick={()=>setModal("addSched")} bg="#16a34a"><Ic.Plus/>製造計画を追加</PBtn>
          </div>
          {/* 出荷指示一覧 */}
          {data.shipments.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:"7px",marginBottom:"12px"}}>
              {data.shipments.map(ship=>(
                <div key={ship.id} style={{background:C.surface,border:`1px solid ${ship.status==="pending"?"#ddd6fe":C.border}`,borderRadius:"12px",padding:"13px 16px",opacity:ship.status==="shipped"?0.6:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"5px",flexWrap:"wrap"}}>
                        <span style={{fontSize:"14px",fontWeight:800}}>🚚 {locName(ship.locationId)}</span>
                        <Tag color={ship.status==="shipped"?"#16a34a":"#7c3aed"} bg={ship.status==="shipped"?"#f0fdf4":"#f5f3ff"}>{ship.status==="shipped"?"出荷済み":"出荷待ち"}</Tag>
                        <span style={{fontSize:"12px",color:C.muted}}>{fmtDate(ship.date)}</span>
                        {ship.createdBy&&<span style={{fontSize:"11px",color:C.muted}}>作成: {ship.createdBy}</span>}
                      </div>
                      <div style={{fontSize:"12px",color:C.sub,display:"flex",gap:"8px",flexWrap:"wrap"}}>{ship.items.map((item,i)=><span key={i}>{prod(item.productId)?.name} {item.quantity}{prod(item.productId)?.unit}</span>)}</div>
                      {ship.note&&<div style={{fontSize:"12px",color:C.muted,marginTop:"3px"}}>{ship.note}</div>}
                      {ship.shippedBy&&<div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>出荷完了: {ship.shippedBy} {fmtFull(ship.shippedDate)}</div>}
                    </div>
                    <div style={{display:"flex",gap:"5px",flexDirection:"column",alignItems:"flex-end"}}>
                      {ship.status==="pending"&&<Btn sm onClick={()=>{if(confirm("出荷しましたか？在庫に反映されます。"))executeShipment(ship);}} bg="#7c3aed" bdr="#7c3aed" color="#fff"><Ic.Truck/>出荷する</Btn>}
                      <Btn sm onClick={()=>{if(confirm("削除しますか？"))persist({...data,shipments:data.shipments.filter(s=>s.id!==ship.id)});}} color="#dc2626" bg="#fef2f2" bdr="#fecaca"><Ic.Trash/></Btn>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {/* 製造計画一覧 */}
          {data.schedules.map(sched=>{const sc={planned:{bg:"#f0fdf4",bdr:"#bbf7d0",text:"#16a34a",label:"予定"},done:{bg:"#f9fafb",bdr:"#e5e7eb",text:"#6b7280",label:"完了"}}[sched.status]||{label:sched.status};return(
            <div key={sched.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"13px 16px",marginBottom:"7px",opacity:sched.status==="done"?0.6:1}}>
              <div style={{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:"7px",marginBottom:"4px",flexWrap:"wrap"}}>
                    <span style={{fontSize:"14px",fontWeight:800}}>🏭 製造計画 {fmtDate(sched.date)}</span>
                    {sc&&<Tag color={sc.text} bg={sc.bg}>{sc.label}</Tag>}
                  </div>
                  <div style={{fontSize:"12px",color:C.sub,display:"flex",gap:"8px",flexWrap:"wrap"}}>{sched.items.map((item,i)=><span key={i}>{prod(item.productId)?.name} {item.quantity}{prod(item.productId)?.unit}</span>)}</div>
                  <MaterialBadges items={sched.items} recipes={data.recipes||[]} small={true}/>
                  {sched.completedBy&&<div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>完了: {sched.completedBy}</div>}
                </div>
                <Btn sm onClick={()=>{if(confirm("削除しますか？"))persist({...data,schedules:data.schedules.filter(s=>s.id!==sched.id)});}} color="#dc2626" bg="#fef2f2" bdr="#fecaca"><Ic.Trash/></Btn>
              </div>
            </div>
          );})}
          {data.shipments.length===0&&data.schedules.length===0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"40px",textAlign:"center",color:C.muted}}><div style={{fontSize:"32px",marginBottom:"8px"}}>📋</div>出荷指示・製造計画がありません</div>}
        </>)}

        {/* 予定カレンダー */}
        {tab==="calendar"&&(
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"16px"}}>
            <div style={{fontSize:"14px",fontWeight:800,marginBottom:"12px",display:"flex",alignItems:"center",gap:"5px"}}><Ic.Cal/>製造予定カレンダー</div>
            <div style={{fontSize:"12px",color:C.muted,marginBottom:"12px",background:C.bg,borderRadius:"8px",padding:"8px 12px"}}>日付をタップしてあなたの予定を入力。パートナーの予定と重なった日が製造候補日になります。</div>
            <AvailabilityCalendar data={data} user={user} persist={persist} onCreateSchedule={handleCreateSchedule}/>
          </div>
        )}

        {/* 履歴 */}
        {tab==="history"&&(
          data.transactions.length===0?<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"40px",textAlign:"center",color:C.muted}}><div style={{fontSize:"32px",marginBottom:"8px"}}>📋</div>記録なし</div>:(
            <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
              {data.transactions.map(tx=>{const def=txDef(tx.txType);const p=prod(tx.productId);return(
                <div key={tx.id} style={{background:C.surface,border:`1px solid ${tx.confirmed?C.border:"#fde68a"}`,borderRadius:"10px",padding:"11px 15px",display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                  <div style={{width:"30px",height:"30px",borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",background:`${def.color}10`,fontSize:"13px",flexShrink:0}}>{def.emoji}</div>
                  <div style={{flex:1,minWidth:"80px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"2px",flexWrap:"wrap"}}>
                      <span style={{fontSize:"13px",fontWeight:700}}>{p?.name}</span>
                      <Tag color={def.color} bg={`${def.color}10`}>{tx.txType}</Tag>
                      {tx.channel&&<Tag color="#ea580c" bg="#fff7ed">{tx.channel}</Tag>}
                      {!tx.confirmed&&<Tag color="#92400e" bg="#fffbeb">未確認</Tag>}
                    </div>
                    <div style={{fontSize:"11px",color:C.muted,display:"flex",gap:"6px",flexWrap:"wrap"}}>
                      {tx.fromLocId&&<span>{locName(tx.fromLocId)}</span>}
                      {tx.toLocId&&<span>→{locName(tx.toLocId)}</span>}
                      {tx.note&&<span>· {tx.note}</span>}
                      <span style={{color:C.accent}}>by {tx.userName}</span>
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
                    <div style={{fontSize:"15px",fontWeight:800,color:def.color}}>{tx.dir==="in"?"+":tx.dir==="out"?"−":"⇄"}{tx.quantity}{p?.unit}</div>
                    <div style={{fontSize:"10px",color:C.muted,marginBottom:"2px"}}>{tx.txDate&&tx.txDate!==tx.date?.slice(0,10)?<><span style={{color:C.text,fontWeight:600}}>{fmtDate(tx.txDate)}</span><span style={{color:C.muted}}> 記録:{fmtFull(tx.date)}</span></>:fmtFull(tx.date)}</div>
                    <div style={{display:"flex",gap:"4px"}}>
                      <button onClick={()=>openEditTx(tx)} style={{display:"flex",alignItems:"center",gap:"3px",padding:"4px 8px",borderRadius:"6px",background:"#eff6ff",border:"1px solid #bfdbfe",color:"#2563eb",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}><Ic.Edit/>修正</button>
                      <button onClick={()=>deleteTx(tx)} style={{display:"flex",alignItems:"center",gap:"3px",padding:"4px 8px",borderRadius:"6px",background:"#fef2f2",border:"1px solid #fecaca",color:"#dc2626",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}><Ic.Trash/>削除</button>
                    </div>
                  </div>
                </div>
              );})}
            </div>
          )
        )}

        {/* 設定 */}
        {tab==="settings"&&(<>
          <div style={{display:"flex",gap:"3px",background:C.border,borderRadius:"8px",padding:"3px",marginBottom:"13px"}}>
            {[["products","商品"],["locations","在庫先"],["expiry","賞味期限"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>setSettingsTab(id)} style={{flex:1,padding:"7px",borderRadius:"6px",fontSize:"13px",fontWeight:700,cursor:"pointer",border:"none",background:settingsTab===id?C.surface:"transparent",color:settingsTab===id?C.text:C.muted,fontFamily:"inherit",boxShadow:settingsTab===id?"0 1px 3px rgba(0,0,0,0.06)":"none"}}>{lbl}</button>
            ))}
          </div>
          {settingsTab==="products"&&(<>
            {/* リセットボタン */}
            <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px"}}>
              <div style={{fontSize:"13px",fontWeight:700,color:"#dc2626",marginBottom:"6px"}}>⚠ テストデータのリセット</div>
              <div style={{fontSize:"12px",color:"#6b7280",marginBottom:"10px"}}>取引履歴を削除して在庫数を初期値に戻します。本番運用開始前に実行してください。</div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                <button onClick={()=>{if(confirm("取引履歴を全て削除しますか？\n在庫数はそのまま保持されます。")){const d={...data,transactions:[],schedules:[],shipments:[],nextTxId:1,nextSchedId:1,nextShipId:1};persist(d);showToast("取引履歴を削除しました","error");}}} style={{padding:"8px 14px",borderRadius:"8px",background:"#fef2f2",border:"1px solid #fecaca",color:"#dc2626",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  履歴だけ削除
                </button>
                <button onClick={()=>{if(confirm("全データをリセットしますか？\n\n・取引履歴 → 全削除\n・在庫数 → スプレッドシートの初期値に戻す\n\nこの操作は取り消せません。")){const d={...data,transactions:[],schedules:[],shipments:[],nextTxId:1,nextSchedId:1,nextShipId:1,stock:[{productId:1,locationId:1,quantity:24},{productId:2,locationId:1,quantity:18},{productId:1,locationId:2,quantity:7},{productId:2,locationId:2,quantity:9},{productId:1,locationId:3,quantity:9},{productId:2,locationId:3,quantity:5},{productId:1,locationId:9,quantity:6}]};persist(d);showToast("全データをリセットしました","error");}}} style={{padding:"8px 14px",borderRadius:"8px",background:"#dc2626",border:"none",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  履歴＋在庫を初期値にリセット
                </button>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"10px"}}><PBtn onClick={()=>setModal("addProd")}><Ic.Plus/>商品追加</PBtn></div>
            <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
              {data.products.map(p=>(
                <div key={p.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",flexWrap:"wrap"}}>
                  <div><div style={{fontWeight:700,fontSize:"14px",marginBottom:"2px"}}>{p.name} <span style={{fontSize:"12px",color:C.muted}}>({p.unit})</span></div><div style={{fontSize:"12px",color:C.muted}}>手持ち閾値:{p.alertThreshold} 委託先閾値:{p.consignThreshold}</div></div>
                  <div style={{display:"flex",gap:"5px"}}><Btn sm onClick={()=>{setEditTarget(p);setModal("editProd");}}><Ic.Edit/>編集</Btn><Btn sm onClick={()=>{if(confirm("削除しますか？"))delProd(p.id);}} color="#dc2626" bg="#fef2f2" bdr="#fecaca"><Ic.Trash/></Btn></div>
                </div>
              ))}
            </div>
          </>)}
          {settingsTab==="locations"&&(<>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"10px"}}><Btn onClick={()=>setModal("addLoc")} bg="#f5f3ff" bdr="#ddd6fe" color="#6d28d9"><Ic.Plus/>在庫先追加</Btn></div>
            <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
              {data.locations.map(loc=>{const typeLabel={own:"手持ち",consignment:"委託先",reserve:"取り置き",storage:"保管・廃棄"}[loc.type]||loc.type;return(
                <div key={loc.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",flexWrap:"wrap"}}>
                  <div><div style={{fontWeight:700,fontSize:"14px",marginBottom:"2px"}}>{loc.name} <Tag color={C.muted} bg={C.bg}>{typeLabel}</Tag></div>{loc.note&&<div style={{fontSize:"12px",color:C.muted}}>{loc.note}</div>}</div>
                  <div style={{display:"flex",gap:"5px"}}><Btn sm onClick={()=>{setEditTarget(loc);setModal("editLoc");}}><Ic.Edit/>編集</Btn>{data.locations.length>1&&<Btn sm onClick={()=>{if(confirm("削除しますか？"))delLoc(loc.id);}} color="#dc2626" bg="#fef2f2" bdr="#fecaca"><Ic.Trash/></Btn>}</div>
                </div>
              );})}
            </div>
          </>)}
          {settingsTab==="recipes"&&(
          <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
            <div style={{fontSize:"12px",color:C.muted,background:"#fffbeb",border:"1px solid #fde68a",borderRadius:"8px",padding:"10px 12px"}}>
              📐 原料と出来上がり数の比率を設定します。加工予定の計算ツールで使用されます。
            </div>
            {(data.recipes||[]).map(r=>(
              <div key={r.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px",flexWrap:"wrap"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:"14px",marginBottom:"2px"}}>{r.name}</div>
                    <div style={{fontSize:"12px",color:C.muted}}>
                      {r.rawMaterial} {r.rawKg}kg → {r.outputQty}{r.outputUnit}
                      {r.productId&&<span style={{marginLeft:"8px",color:C.accent}}>({data.products.find(p=>p.id===r.productId)?.name||"未リンク"})</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:"5px"}}>
                    <Btn sm onClick={()=>{setEditTarget(r);setModal("editRecipe");}}><Ic.Edit/>編集</Btn>
                    <Btn sm onClick={()=>{if(confirm(`「${r.name}」を削除しますか？`)){const d={...data,recipes:(data.recipes||[]).filter(x=>x.id!==r.id)};persist(d);}}} color="#dc2626" bg="#fef2f2" bdr="#fecaca"><Ic.Trash/></Btn>
                  </div>
                </div>
              </div>
            ))}
            <button onClick={()=>setModal("addRecipe")} style={{padding:"10px",borderRadius:"8px",background:"#fffbeb",border:"2px dashed #fde68a",color:"#92400e",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:"5px"}}>
              <Ic.Plus/>レシピを追加
            </button>
          </div>
        )}

        {settingsTab==="expiry"&&(<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
              <div style={{fontSize:"12px",color:C.muted}}>{EXPIRY_WARN_DAYS}日以内でアラート</div>
              <Btn onClick={()=>setModal("addExpiry")} bg="#fef2f2" bdr="#fecaca" color="#dc2626" sx={{flexShrink:0}}><Ic.Plus/>追加</Btn>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
              {data.stockExpiries.map(e=>{const p=prod(e.productId);const loc=data.locations.find(l=>l.id===e.locationId);const d=daysUntil(e.expiryDate);const isAlert=d<=EXPIRY_WARN_DAYS;return(
                <div key={e.id} style={{background:C.surface,border:`1px solid ${isAlert?"#fecaca":C.border}`,borderRadius:"10px",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",flexWrap:"wrap"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"2px",flexWrap:"wrap"}}><span style={{fontWeight:700,fontSize:"14px"}}>{loc?.name}</span><span style={{color:C.sub}}>{p?.name}</span><span style={{fontWeight:700}}>{e.quantity}{p?.unit}</span></div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"13px",color:C.muted}}>{e.expiryDate}</span>{isAlert&&<Tag color="#dc2626" bg="#fef2f2">{d<=0?"期限切れ":`あと${d}日`}</Tag>}{e.note&&<span style={{fontSize:"12px",color:C.muted}}>({e.note})</span>}</div>
                  </div>
                  <div style={{display:"flex",gap:"5px"}}><Btn sm onClick={()=>{setEditTarget(e);setModal("editExpiry");}}><Ic.Edit/></Btn><Btn sm onClick={()=>{if(confirm("削除しますか？"))delExpiry(e.id);}} color="#dc2626" bg="#fef2f2" bdr="#fecaca"><Ic.Trash/></Btn></div>
                </div>
              );})}
              {data.stockExpiries.length===0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"28px",textAlign:"center",color:C.muted}}>賞味期限データがありません</div>}
            </div>
          </>)}
        </>)}
      </main>

      {modal==="tx"&&<Modal title="取引を記録" onClose={()=>setModal(null)} wide><TxForm data={data} user={user} onSave={saveTx} onClose={()=>setModal(null)}/></Modal>}

      {showSwitchModal&&(
        <Modal title="ユーザーを切り替え" onClose={()=>{setShowSwitchModal(false);setSwitchCode("");setSwitchErr(false);}}>
          <div style={{fontSize:"13px",color:C.sub,marginBottom:"8px"}}>パスコードを入力してください</div>
          <input
            style={{...IS,letterSpacing:"4px",fontSize:"20px",textAlign:"center"}}
            type="password"
            value={switchCode}
            onChange={e=>{setSwitchCode(e.target.value);setSwitchErr(false);}}
            placeholder="●●●●●●"
            autoFocus
          />
          {switchErr&&<div style={{color:"#dc2626",fontSize:"12px",textAlign:"center"}}>パスコードが違います</div>}
          <div style={{display:"flex",gap:"8px"}}>
            <Btn onClick={()=>{setShowSwitchModal(false);setSwitchCode("");setSwitchErr(false);}} full>キャンセル</Btn>
            <PBtn onClick={()=>{
              if(switchCode==="443875"){
                localStorage.removeItem("nouo-user");
                setShowSwitchModal(false);
                setUser(false);
              } else {
                setSwitchErr(true);
                setSwitchCode("");
              }
            }} full>切り替える</PBtn>
          </div>
        </Modal>
      )}
      {modal==="addRecipe"&&<Modal title="レシピを追加" onClose={()=>setModal(null)}><RecipeForm onSave={saveRecipe} onClose={()=>setModal(null)}/></Modal>}
      {modal==="editRecipe"&&editTarget&&<Modal title="レシピを編集" onClose={()=>{setModal(null);setEditTarget(null);}}><RecipeForm initial={editTarget} onSave={saveRecipe} onClose={()=>{setModal(null);setEditTarget(null);}}/></Modal>}

      {/* 要訂正モーダル */}
      {correctionTarget&&(
        <Modal title="要訂正の内容を入力" onClose={()=>{setCorrectionTarget(null);setCorrectionNote("");}}>
          <div style={{background:C.bg,borderRadius:"8px",padding:"10px 12px",fontSize:"12px",color:C.muted}}>
            <div><b>{data.products.find(p=>p.id===correctionTarget.productId)?.name}</b> / {correctionTarget.txType} / {correctionTarget.quantity}{data.products.find(p=>p.id===correctionTarget.productId)?.unit}</div>
            <div>by {correctionTarget.userName}</div>
          </div>
          <Field label="訂正が必要な箇所・正しい内容">
            <textarea style={{...IS,resize:"vertical",minHeight:"80px"}} value={correctionNote}
              onChange={e=>setCorrectionNote(e.target.value)}
              placeholder="例：製造本数は21本が正しいです。確認して再入力してください。"/>
          </Field>
          <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:"8px",padding:"10px 12px",fontSize:"12px",color:"#dc2626"}}>
            ⚠ Yoshimiさんのホーム画面に通知が表示されます。在庫は変更されません。
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <Btn onClick={()=>{setCorrectionTarget(null);setCorrectionNote("");}} full>キャンセル</Btn>
            <PBtn onClick={requestCorrection} disabled={!correctionNote.trim()} full bg="#dc2626">要訂正として送信</PBtn>
          </div>
        </Modal>
      )}

      {/* 取引編集モーダル */}
      {editTxTarget&&(
        <Modal title="取引を修正する" onClose={()=>setEditTxTarget(null)}>
          <div style={{background:C.bg,borderRadius:"8px",padding:"10px 12px",marginBottom:"4px",fontSize:"12px",color:C.muted}}>
            <div><b>{data.products.find(p=>p.id===editTxTarget.productId)?.name}</b> / {editTxTarget.txType}</div>
            <div>{fmtFull(editTxTarget.date)} by {editTxTarget.userName}</div>
          </div>
          <Field label="数量（修正後）">
            <input style={IS} type="number" min="1" value={editTxQty} onChange={e=>setEditTxQty(Number(e.target.value))}/>
          </Field>
          {editTxTarget.channel!==null&&editTxTarget.channel!==undefined&&(
            <Field label="販路">
              <select style={IS} value={editTxChannel} onChange={e=>setEditTxChannel(e.target.value)}>
                {["まるごと高知","自社WEB","他社EC","直接注文","イベント","その他"].map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
          )}
          <Field label="備考">
            <input style={IS} value={editTxNote} onChange={e=>setEditTxNote(e.target.value)} placeholder="メモ"/>
          </Field>
          <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:"8px",padding:"8px 12px",fontSize:"12px",color:"#92400e"}}>
            ⚠ 数量を変更すると在庫数も自動で再計算されます
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <Btn onClick={()=>setEditTxTarget(null)} full>キャンセル</Btn>
            <PBtn onClick={saveEditTx} full>修正を保存する</PBtn>
          </div>
        </Modal>
      )}
      {modal==="addSched"&&<Modal title="製造計画を追加" onClose={()=>setModal(null)} wide><ScheduleForm data={data} onSave={addSched} onClose={()=>setModal(null)} initial={schedDate?{date:schedDate,items:[],note:""}:undefined}/></Modal>}
      {modal==="addShip"&&<Modal title="出荷指示を作成" onClose={()=>setModal(null)} wide><ShipmentForm data={data} onSave={addShip} onClose={()=>setModal(null)}/></Modal>}
      {modal==="addExpiry"&&<Modal title="賞味期限を追加" onClose={()=>setModal(null)}><ExpiryForm data={data} onSave={addExpiry} onClose={()=>setModal(null)}/></Modal>}
      {modal==="editExpiry"&&editTarget&&<Modal title="賞味期限を編集" onClose={()=>{setModal(null);setEditTarget(null);}}><ExpiryForm data={data} initial={{...editTarget,productId:String(editTarget.productId),locationId:String(editTarget.locationId)}} onSave={editExpiry} onClose={()=>{setModal(null);setEditTarget(null);}}/></Modal>}
      {modal==="addProd"&&<Modal title="商品を登録" onClose={()=>setModal(null)}><ProductForm onSave={addProd} onClose={()=>setModal(null)}/></Modal>}
      {modal==="editProd"&&editTarget&&<Modal title="商品を編集" onClose={()=>{setModal(null);setEditTarget(null);}}><ProductForm initial={editTarget} onSave={editProd} onClose={()=>{setModal(null);setEditTarget(null);}}/></Modal>}
      {modal==="addLoc"&&<Modal title="在庫先を追加" onClose={()=>setModal(null)}><LocationForm onSave={addLoc} onClose={()=>setModal(null)}/></Modal>}
      {modal==="editLoc"&&editTarget&&<Modal title="在庫先を編集" onClose={()=>{setModal(null);setEditTarget(null);}}><LocationForm initial={editTarget} onSave={editLoc} onClose={()=>{setModal(null);setEditTarget(null);}}/></Modal>}
    </div>
  );
}

// ═══════════════════ ROOT ═══════════════════
function App() {
  const [data,setData]=useState(null);
  const [user,setUser]=useState(null);
  const [toast,setToast]=useState(null);
  const [notifPerm,setNotifPerm]=useState(typeof Notification!=="undefined"?Notification.permission:"denied");
  const [updatePopup,setUpdatePopup]=useState(null);
  const lastSeenTsRef=useRef(parseInt(localStorage.getItem('nouo-last-seen')||'0'));
  const userRef=useRef(null); // subscriptionの stale closure 対策

  const buildPopupItems=(d,role)=>{
    const items=[];
    if(role==="admin"){const unconf=d.transactions.filter(t=>!t.confirmed).length;if(unconf>0)items.push({icon:"✅",label:"確認待ちの入力",count:unconf,tab:"check",color:"#92400e",bg:"#fffbeb"});}
    // パートナー：要訂正の通知
    if(role==="partner"){const nc=d.transactions.filter(t=>t.correctionStatus==="needs_correction").length;if(nc>0)items.push({icon:"⚠️",label:"入力の訂正が必要です",count:nc,tab:"home",color:"#dc2626",bg:"#fef2f2"});}
    const sA=[];for(const p of d.products.filter(p=>p.trackInventory!==false))for(const loc of d.locations){const qty=getQ(d.stock,p.id,loc.id);const thr=loc.type==="consignment"?(p.consignThreshold??p.alertThreshold):p.alertThreshold;if(qty<=thr&&(loc.type==="own"||loc.type==="consignment"))sA.push(1);}
    if(sA.length>0)items.push({icon:"⚠️",label:"在庫不足",count:sA.length,tab:"stock",color:"#dc2626",bg:"#fef2f2"});
    const eA=d.stockExpiries.filter(e=>{const loc=d.locations.find(l=>l.id===e.locationId);return loc?.type==="consignment"&&daysUntil(e.expiryDate)<=10;}).length;
    if(eA>0)items.push({icon:"🕐",label:"賞味期限アラート",count:eA,tab:"stock",color:"#dc2626",bg:"#fef2f2"});
    const pS=d.shipments.filter(s=>s.status==="pending").length;
    if(pS>0)items.push({icon:"🚚",label:"出荷指示待ち",count:pS,tab:role==="admin"?"shipments":"home",color:"#7c3aed",bg:"#f5f3ff"});
    const pSc=d.schedules.filter(s=>s.status==="planned"&&s.date>=todayStr()).length;
    if(pSc>0)items.push({icon:"🏭",label:"加工予定日が設定されました",count:pSc,tab:"calendar",color:"#16a34a",bg:"#f0fdf4"});
    // アラートなしでも「データ更新あり」を表示
    if(items.length===0){
      const lastTx=d.transactions[0];
      const msg=lastTx?`最終更新: ${lastTx.userName} (${lastTx.txType})`:"データが更新されました";
      items.push({icon:"🔄",label:msg,count:null,tab:null,color:"#2563eb",bg:"#eff6ff"});
    }
    return items;
  };
  const checkAndShowPopup=(d,role)=>{
    const ts=d.ts||0;
    if(ts>lastSeenTsRef.current){
      const items=buildPopupItems(d,role);
      if(items.length>0)setUpdatePopup({items,ts});
      else{localStorage.setItem('nouo-last-seen',String(ts));lastSeenTsRef.current=ts;}
    }
  };

  useEffect(()=>{const u=loadUser();setUser(u||false);userRef.current=u||false;loadShared().then(d=>{setData(d);if(u)checkAndShowPopup(d,u.role);});},[]);
  useEffect(()=>{
    const unsub=subscribeShared(async fresh=>{
      setData(fresh);
      await checkNotify(fresh);
      // userRef経由で最新のuserを参照
      const u=userRef.current;
      if(u) checkAndShowPopup(fresh, u.role);
    });
    return()=>unsub();
  },[]);

  const persist=useCallback(async d=>{
    setData(d);
    try{
      await saveShared(d);
    }catch(e){
      console.error('persist error:',e);
    }
    await checkNotify(d);
  },[]);
  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};
  const enableNotifications=async()=>{const ok=await reqNotif();setNotifPerm(ok?"granted":"denied");showToast(ok?"🔔 通知を有効にしました":"ブラウザの設定から通知を許可してください","error");};

  if(!data||user===null)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,color:C.accent,fontFamily:"'DM Sans',sans-serif",fontSize:"14px"}}>読み込み中…</div>;
  if(user===false)return <SetupScreen onDone={async u=>{await saveUser(u);setUser(u);}}/>;

  const stockAlerts=getStockAlerts(data.products,data.stock,data.locations);
  const expiryAlerts=getExpiryAlerts(data.stockExpiries,data.locations);
  const common={data,user,setUser,persist,showToast,stockAlerts,expiryAlerts,notifPerm,enableNotifications};

  const dismissPopup=(tab)=>{
    if(updatePopup){localStorage.setItem('nouo-last-seen',String(updatePopup.ts));lastSeenTsRef.current=updatePopup.ts;}
    setUpdatePopup(null);
    // 該当タブへ誘導（管理者のみ）
    if(tab&&user.role==="admin") window.__setTab&&window.__setTab(tab);
  };

  return (<>
    {user.role==="partner"?<PartnerApp {...common}/>:<AdminApp {...common}/>}

    {/* 更新ポップアップ */}
    {updatePopup&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:"20px"}}>
        <div style={{background:"#fff",borderRadius:"16px",width:"100%",maxWidth:"340px",boxShadow:"0 24px 60px rgba(0,0,0,0.2)",overflow:"hidden"}}>
          <div style={{background:"#2563eb",padding:"16px 20px"}}>
            <div style={{fontSize:"16px",fontWeight:800,color:"#fff",marginBottom:"2px"}}>📋 確認してください</div>
            <div style={{fontSize:"12px",color:"#bfdbfe"}}>アプリが更新されました</div>
          </div>
          <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:"8px"}}>
            {updatePopup.items.map((item,i)=>(
              <button key={i} onClick={()=>dismissPopup(item.tab)} style={{display:"flex",alignItems:"center",gap:"12px",padding:"10px 12px",borderRadius:"10px",background:item.bg,border:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%"}}>
                <span style={{fontSize:"20px"}}>{item.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"13px",fontWeight:700,color:item.color}}>{item.label}</div>
                  <div style={{fontSize:"11px",color:"#6b7280"}}>タップして確認</div>
                </div>
                {item.count!==null&&<div style={{fontSize:"20px",fontWeight:800,color:item.color}}>{item.count}<span style={{fontSize:"11px",fontWeight:600,marginLeft:"1px"}}>件</span></div>}
              </button>
            ))}
          </div>
          <div style={{padding:"0 16px 16px"}}>
            <button onClick={()=>dismissPopup(null)} style={{width:"100%",padding:"11px",borderRadius:"10px",background:"#f1f5f9",border:"none",color:"#374151",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>閉じる</button>
          </div>
        </div>
      </div>
    )}

    {toast&&(<div style={{position:"fixed",bottom:"20px",left:"50%",transform:"translateX(-50%)",background:toast.type==="error"?"#fef2f2":toast.type==="info"?"#eff6ff":"#f0fdf4",border:`1px solid ${toast.type==="error"?"#fecaca":toast.type==="info"?"#bfdbfe":"#bbf7d0"}`,color:toast.type==="error"?"#dc2626":toast.type==="info"?"#1d4ed8":"#16a34a",padding:"10px 20px",borderRadius:"10px",fontSize:"13px",fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,0.12)",zIndex:2000,whiteSpace:"nowrap"}}>{toast.msg}</div>)}
  </>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
